{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - Farmer Risk Intelligence{% endblock %}

{% block content %}
<div class="row justify-content-center" data-aos="fade-up">
    <div class="col-md-5 mt-5">
        <div class="glass-card p-4">
            <h3 class="text-center mb-4 text-success"><i class="fa-solid fa-right-to-bracket me-2"></i>Login</h3>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary-custom">Login</button>
                </div>
            </form>
            <div class="mt-3 text-center">
                <small>Don't have an account? <a href="{% url 'register' %}" class="text-decoration-none">Register here</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
