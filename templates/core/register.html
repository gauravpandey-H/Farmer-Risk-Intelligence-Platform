{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Register - Farmer Risk Intelligence{% endblock %}

{% block content %}
<div class="row justify-content-center" data-aos="fade-up">
    <div class="col-md-6 mt-4">
        <div class="glass-card p-4">
            <h3 class="text-center mb-4 text-success"><i class="fa-solid fa-user-plus me-2"></i>Register</h3>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary-custom">Register</button>
                </div>
            </form>
            <div class="mt-3 text-center">
                <small>Already have an account? <a href="{% url 'login' %}" class="text-decoration-none">Login here</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
